name: gitleaks

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  scan:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: use gitleaks docker image
        run: |
          docker pull zricethezav/gitleaks:latest
          echo $GITHUB_WORKSPACE
          docker run -v $GITHUB_WORKSPACE:/path zricethezav/gitleaks:latest detect --source="/path" --config="/path/gitleaks.toml" --log-opts="90bb5b692763468db76df70c8c48304f06dc8fee..HEAD" --verbose
