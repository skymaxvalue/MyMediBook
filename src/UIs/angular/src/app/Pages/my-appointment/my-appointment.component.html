<div class="dashboard-card">
  <table class="appointment-table">
    <thead>
      <tr>
        <th>
          Visit Purpose
          <span class="sort-icon">▼</span>
        </th>

        <th>
          Patient Name
          <span class="sort-icon">▼</span>
        </th>

        <th>
          Appointment Date
          <span class="sort-icon">▼</span>
        </th>

        <th>Appointment Time</th>

        <th>
          Dr. Name
          <span class="sort-icon">▼</span>
        </th>

        <th>Status</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let item of tableData" [class.highlight]="item.patientName === 'Self'">
        <td>
          {{ item.visitPurpose }}
        </td>

        <td>
          {{ item.patientName }}
        </td>

        <td>
          {{ item.appointmentDate }}
        </td>

        <td>
          {{ item.appointmentTime }}
        </td>

        <td>
          {{ item.doctorName }}
        </td>

        <td>
          <span
            class="status"
            [ngClass]="{
              completed: item.status === 'Completed',
              upcoming: item.status === 'Upcoming',
            }"
          >
            {{ item.status }}
          </span>
        </td>
      </tr>
    </tbody>
  </table>
</div>
