<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="forgot-wrapper">

    <div class="forgot-card">

        <h1>FORGOT PASSWORD</h1>

        <p class="forgot-subtext">
            Enter your registered email or mobile number to receive OTP.
        </p>

        <!-- INPUT -->
        <div class="input-group">
            <label>Email / Mobile Number</label>
            <input type="text" id="userInput" placeholder="Enter email or phone number">
        </div>

        <!-- BUTTON -->
        <button class="btn-primary" id="sendOtpBtn">Send OTP</button>

        <!-- BACK -->
        <p class="back-text">
            Back to <a href="login.html">Login</a>
        </p>

    </div>

</div>

<script src="js/forgot.js"></script>
</body>
</html>
