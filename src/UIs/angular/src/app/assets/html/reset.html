<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>

    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <style>

.otp-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.otp-card {
    width: 520px;
    background: #fff;
    padding: 50px;
    border-radius: 16px;
    text-align: center;
    border: 1px solid #dcdcff;
}

.otp-card h1 {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 15px;
}

.otp-subtext {
    color: #666;
    font-size: 16px;
    margin-bottom: 30px;
    line-height: 1.5;
}

.input-group {
    margin-bottom: 20px;
}

.input-group input {
    width: 100%;
    padding: 14px;
    border: 1px solid #dcdcdc;
    border-radius: 10px;
    font-size: 15px;
    text-align: center;
}

.input-group input:focus {
    border-color: #4A6CF7;
    outline: none;
}

.btn-primary {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(90deg, #4A6CF7, #3B5BDB);
    color: #fff;
    font-size: 18px;
    margin-bottom: 15px;
}

.btn-outline {
    width: 100%;
    padding: 14px;
    border-radius: 30px;
    border: 1px solid #4A6CF7;
    background: transparent;
    font-size: 18px;
}

.btn-outline:hover {
    background: #4A6CF7;
    color: #fff;
}

</style>
</head>
<body>

<div class="otp-wrapper">

    <div class="otp-card">

        <h1>RESET PASSWORD</h1>

        <p class="otp-subtext">
            Enter your new password and confirm it to reset your account.
        </p>

       
        <div class="input-group">
            <input type="password" id="newPassword" placeholder="New Password">
        </div>

        <div class="input-group">
            <input type="password" id="confirmPassword" placeholder="Confirm Password">
        </div>

       
        <button class="btn-primary" id="resetBtn">Reset Password</button>

        <button class="btn-outline" onclick="window.location.href='login.html'">
            Cancel
        </button>

    </div>

</div>

<script src="js/reset.js"></script>
</body>
</html>
