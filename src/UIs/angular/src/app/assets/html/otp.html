<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification</title>

    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>

.otp-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.otp-card {
    width: 520px;
    background: #fff;
    padding: 50px;
    border-radius: 16px;
    text-align: center;
    border: 1px solid #dcdcff;
}

.otp-card h1 {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 15px;
}

.otp-subtext {
    color: #666;
    font-size: 16px;
    margin-bottom: 30px;
    line-height: 1.5;
}

.otp-box {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 25px;
}

.otp-input {
    width: 60px;
    height: 60px;
    border: 1px solid #ccc;
    border-radius: 10px;
    text-align: center;
    font-size: 20px;
    outline: none;
}

.otp-input:focus {
    border-color: #4A6CF7;
}

.otp-info {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    margin-bottom: 30px;
    color: #444;
}

.otp-info a {
    color: #4A6CF7;
    text-decoration: underline;
}

.btn-primary {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(90deg, #4A6CF7, #3B5BDB);
    color: #fff;
    font-size: 18px;
    margin-bottom: 15px;
}

.btn-outline {
    width: 100%;
    padding: 14px;
    border-radius: 30px;
    border: 1px solid #4A6CF7;
    background: transparent;
    font-size: 18px;
}

.btn-outline:hover {
    background: #4A6CF7;
    color: #fff;
}

</style>
</head>
<body>

<div class="otp-wrapper">

    <div class="otp-card">

        <h1>OTP VERIFICATION</h1>

        <p class="otp-subtext">
            Please enter the OTP send to your registered<br>
            mobile number / e-mail account.
        </p>

        
        <div class="otp-box">
            <input type="text" maxlength="1" class="otp-input">
            <input type="text" maxlength="1" class="otp-input">
            <input type="text" maxlength="1" class="otp-input">
            <input type="text" maxlength="1" class="otp-input">
        </div>

  
        <div class="otp-info">
            <span>Remaining time: <b id="timer">00:59s</b></span>
            <span>Didn’t get the code? <a href="#" id="resendBtn">Resend</a></span>
        </div>

       
        <button class="btn-primary">Verify</button>
       <button class="btn-outline" onclick="window.location.href='login.html'">Cancel</button>

    </div>

</div>

<script src="js/otp.js"></script>
</body>
</html>
