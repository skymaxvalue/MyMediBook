<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification</title>

    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="otp-wrapper">

    <div class="otp-card">

        <h1>OTP VERIFICATION</h1>

        <p class="otp-subtext">
            Please enter the OTP send to your registered<br>
            mobile number / e-mail account.
        </p>

        <!-- OTP INPUT -->
        <div class="otp-box">
            <input type="text" maxlength="1" class="otp-input">
            <input type="text" maxlength="1" class="otp-input">
            <input type="text" maxlength="1" class="otp-input">
            <input type="text" maxlength="1" class="otp-input">
        </div>

        <!-- INFO -->
        <div class="otp-info">
            <span>Remaining time: <b id="timer">00:59s</b></span>
            <span>Didn’t get the code? <a href="#" id="resendBtn">Resend</a></span>
        </div>

        <!-- BUTTONS -->
        <button class="btn-primary">Verify</button>
       <button class="btn-outline" onclick="window.location.href='login.html'">
    Cancel
</button>

    </div>

</div>

<script src="js/otp.js"></script>
</body>
</html>
