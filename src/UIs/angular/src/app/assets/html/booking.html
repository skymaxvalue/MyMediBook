<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Patient Information</title>

<link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/booking.css">

</head>

<body>

<div id="navbar-container"></div>

<div class="availability-container">

<h2>Patient Information</h2>

<div class="schedule-box">


<form id="bookingForm">

<div class="form-grid">

<label>First Name</label>
<input type="text" id="firstName" placeholder="Enter patient first name" required>

<label>Last Name</label>
<input type="text" id="lastName" placeholder="Enter patient last name" required>

<label>Date Of Birth</label>
<input type="date" id="dateOfBirth" required>

<label>Age</label>
<div class="inline-group age-type-group">
    <input type="number" id="age" placeholder="Enter age" required style="width: 120px;">

    <label class="age-option">
        <input type="radio" name="ageType" value="years" required>
        <span>Year(s)</span>
    </label>

    <label class="age-option">
        <input type="radio" name="ageType" value="months" required>
        <span>Month(s)</span>
    </label>
</div>

<label>Gender</label>
<select required>
<option value="" disabled selected>Select patient gender</option>
<option>Male</option>
<option>Female</option>
</select>



  <label>Do you have insurance?</label>
<div class="mobile-radio-group">

    <label class="radio-item">
        <input type="radio" name="insurance" value="yes" required>
        <span>Yes</span>
    </label>

    <label class="radio-item">
        <input type="radio" name="insurance" value="no" required>
        <span>No</span>
    </label>

</div>

<label>Primary Address</label>
<textarea placeholder="Enter patient address" required></textarea>

<label>Contact Number</label>
<input type="tel" id="phone" placeholder="Enter contact number" required>

<label>Email Address</label>
<input type="email" placeholder="Enter email address" required>

<label>Dr. Visit Purpose</label>
<textarea placeholder="Enter visit purpose / symptoms" required></textarea>

<label>Type Of Visit</label>
<select required>
<option value="" disabled selected>Select type of visit</option>
<option>Consultation</option>
<option>Follow-up</option>
</select>

<label>OTP Verification</label>

<div class="mobile-radio-group otp-method-group">

    <label class="otp-option">
        <input type="radio" name="otp" value="mobile" required>
        <span>Mobile Number</span>
    </label>

    <label class="otp-option">
        <input type="radio" name="otp" value="email" required>
        <span>Email Address</span>
    </label>

</div>

</div>

<div class="form-actions">
<button type="submit" class="book-btn">Confirm</button>
<button type="reset" class="clear-btn">Clear</button>
</div>

</form>


</div>
</div>

<!-- INSURANCE -->
<div id="insuranceModal" class="modal">
<div class="modal-content">
<div class="close-icon" onclick="closeInsuranceModal()">âœ–</div>

<h2>Insurance Details</h2>

<div class="form-grid">

    <label>Provider Name</label>
    <input id="provider" placeholder="Enter Value" required>

    <label>Insurance Policy Id</label>
   <input id="policy" placeholder="Enter Value" required>

    <label>Insurance Group Id</label>
    <input id="groupId" placeholder="Enter Value" required>


    <label>Primary Holder Name</label>
    <input id="holderName" placeholder="Enter Value" required>

    <label>Primary Address</label>
    <input id="insuranceAddress" placeholder="Enter Value" required>


</div>
<div class="form-actions">
<button class="book-btn" onclick="confirmInsurance()">Confirm</button>
<button class="cancel-btn" onclick="closeInsuranceModal()">Cancel</button>
</div>

</div>
</div>

<!-- PAYMENT -->
<div id="paymentModal" class="modal">
  <div class="modal-content">

    <div class="close-icon" onclick="closePaymentModal()">âœ–</div>

    <h2 class="modal-title">Payment Details</h2>

    <div class="form-grid">

        <label>Payment Type</label>
        <input id="paymentType" placeholder="Enter Value" required>

        <label>Card Holder Name</label>
        <input id="cardHolder" placeholder="Enter Value" required>

        <label>Card Number</label>
        <input id="cardNumber" placeholder="Enter Value" required>

        <label>Expiry Date</label>
        <div class="inline-row">
            <input id="expiry" placeholder="MM/YY" required>
            <span class="cvv-label">CVV</span>
            <input id="cvv" placeholder="XXX" required>

            

        </div>

    </div>

  
    <div class="form-actions">
        <button onclick="confirmPayment()">Confirm</button>
        <button class="cancel-btn" onclick="closePaymentModal()">Cancel</button>
    </div>

  </div>
</div>




<!-- OTP -->
<div id="otpModal" class="modal">

  <div class="modal-content otp-wrapper">


    <div class="close-icon" onclick="closeOtp()">âœ–</div>

    <div class="otp-container">

      <div class="otp-left">
        <div class="doctor-card">
          <div class="doctor-img-box">
            <img src="images/doc.jpg">
          </div>
          <h3>Dr. Kumar</h3>
          <p>MBBS</p>
          <span class="tag">GENERAL</span>
        </div>
      </div>

      <!-- RIGHT -->
      <div class="otp-right">

        <h2>OTP VERIFICATION</h2>

        <p class="otp-text">
          Please enter the OTP send to your mobile number /
          e-mail account to confirm your appointment.
        </p>

        
        <div class="otp-input-group">
          <input maxlength="1" class="otp-input">
          <input maxlength="1" class="otp-input">
          <input maxlength="1" class="otp-input">
          <input maxlength="1" class="otp-input">
        </div>

      
        <div class="otp-bottom">
          <span>Remaining time: <b id="timer">00:59s</b></span>
          <span>Didn't get the code? <a href="#">Resend</a></span>
        </div>

        <div class="otp-actions">
          <button class="verify-btn" onclick="verifyOtp()">Verify</button>
          <button class="cancel-btn" onclick="cancelOtp()">Cancel</button>
        </div>

      </div>

    </div>

  </div>
</div>


<div id="footer-container"></div>

<script>
fetch("footer.html")
.then(res => res.text())
.then(data => {
    document.getElementById("footer-container").innerHTML = data;
});
</script>

<script src="js/navbar.js"></script>
<script>


let insuranceData = null;
let paymentData = null;
let insuranceChoice = null;

document.addEventListener("DOMContentLoaded", () => {

    
    const form = document.getElementById("bookingForm");
    const dobInput = document.getElementById("dateOfBirth");

    form.addEventListener("submit", function (e) {

        if (!form.checkValidity()) {
            form.reportValidity();
            return;
        }

        e.preventDefault();
        confirmBooking();
    });



    const radios = document.querySelectorAll('input[name="insurance"]');

    radios.forEach(radio => {
        radio.addEventListener("change", function () {

            insuranceChoice = this.value;

            if (this.value === "yes") {
                document.getElementById("insuranceModal").style.display = "flex";
            }

            if (this.value === "no") {
                document.getElementById("paymentModal").style.display = "flex";
            }
        });
    });



    const inputs = document.querySelectorAll(".otp-input");

    inputs.forEach((input, index) => {

        input.addEventListener("input", (e) => {

            let value = e.target.value.replace(/[^0-9]/g, "");
            input.value = value;

            if (value && index < inputs.length - 1) {
                inputs[index + 1].focus();
            }
        });

        input.addEventListener("keydown", (e) => {

            if (e.key === "Backspace" && !input.value && index > 0) {
                inputs[index - 1].focus();
            }
        });

    });

    
    dobInput.addEventListener("change", updateAgeFromDob);

});





function closeInsuranceModal() {
    document.getElementById("insuranceModal").style.display = "none";
}

function closePaymentModal() {
    document.getElementById("paymentModal").style.display = "none";
}



function confirmInsurance() {

    const provider = document.getElementById("provider").value;
    const policy = document.getElementById("policy").value;

    if (!provider || !policy) {
        alert("Please fill all insurance fields");
        return;
    }

    insuranceData = { provider, policy };

    closeInsuranceModal();


    const selected = document.querySelector('input[name="insurance"]:checked');
    if (selected) selected.parentElement.style.color = "green";
}



function confirmPayment() {

    const card = document.getElementById("cardNumber").value;
    const cvv = document.getElementById("cvv").value;

    if (!card || !cvv) {
        alert("Please fill all payment details");
        return;
    }

    paymentData = { card, cvv };

    closePaymentModal();

    const selected = document.querySelector('input[name="insurance"]:checked');
    if (selected) selected.parentElement.style.color = "green";
}


function confirmBooking() {

    if (!insuranceChoice) {
        alert("Please choose Yes or No");
        return;
    }

    if (insuranceChoice === "yes" && !insuranceData) {
        alert("Please fill Insurance Details");
        return;
    }

    if (insuranceChoice === "no" && !paymentData) {
        alert("Please fill Payment Details");
        return;
    }

const appointment = {
    firstName: document.getElementById("firstName").value,
    lastName: document.getElementById("lastName").value,
    date: localStorage.getItem("selectedDate") || "Not Selected",
    time: localStorage.getItem("selectedTime") || "Not Selected"
};

localStorage.setItem("latestAppointment", JSON.stringify(appointment));
    
    localStorage.setItem("tempAppointment", JSON.stringify(appointment));

   
    openOtp();
}


function updateAgeFromDob() {
    const dobInput = document.getElementById("dateOfBirth");
    const ageInput = document.getElementById("age");
    const yearsRadio = document.querySelector('input[name="ageType"][value="years"]');
    const monthsRadio = document.querySelector('input[name="ageType"][value="months"]');

    if (!dobInput.value) {
        ageInput.value = "";
        ageInput.readOnly = false;
        ageInput.disabled = false;
        yearsRadio.checked = false;
        monthsRadio.checked = false;
        return;
    }

    const dob = new Date(dobInput.value + "T00:00:00");
    const today = new Date();

    if (dob > today) {
        ageInput.value = "";
        ageInput.readOnly = false;
        ageInput.disabled = false;
        yearsRadio.checked = false;
        monthsRadio.checked = false;
        return;
    }

    let years = today.getFullYear() - dob.getFullYear();
    let months = today.getMonth() - dob.getMonth();
    const days = today.getDate() - dob.getDate();

    if (days < 0) {
        months -= 1;
    }

    if (months < 0) {
        years -= 1;
        months += 12;
    }

    if (years <= 0) {
        let totalMonths = months;

        if (days < 0 && totalMonths > 0) {
            totalMonths -= 1;
        }

        ageInput.value = Math.max(totalMonths, 0);
        ageInput.readOnly = true;
        ageInput.disabled = true;
        monthsRadio.checked = true;
        yearsRadio.checked = false;
        return;
    }

    ageInput.value = years;
    ageInput.readOnly = true;
    ageInput.disabled = true;
    yearsRadio.checked = true;
    monthsRadio.checked = false;
}


function openOtp() {
    document.getElementById("otpModal").style.display = "flex";
    startTimer();

    // ðŸ”¥ auto focus first box
    setTimeout(() => {
        document.querySelector(".otp-input").focus();
    }, 100);
}
function closeOtp() {
    document.getElementById("otpModal").style.display = "none";
}



function verifyOtp() {

    const inputs = document.querySelectorAll(".otp-input");
    let otp = "";

    inputs.forEach(i => otp += i.value);

    if (otp.length !== 4) {
        alert("Enter complete OTP");
        return;
    }

    const appointment = JSON.parse(localStorage.getItem("tempAppointment"));

    let list = JSON.parse(localStorage.getItem("appointments")) || [];
    list.push(appointment);

    localStorage.setItem("appointments", JSON.stringify(list));

    localStorage.removeItem("tempAppointment");

    window.location.href = "success.html";
}


function cancelOtp() {
    localStorage.removeItem("tempAppointment");
    window.location.href = "failed.html";
}


let time = 120; // 2 minutes
let interval;

function startTimer() {

    clearInterval(interval);
    time = 180;

    interval = setInterval(() => {

        const timerEl = document.getElementById("timer");

        let min = Math.floor(time / 60);
        let sec = time % 60;

        if (sec < 10) sec = "0" + sec;

        timerEl.innerText = `${min}:${sec}s`;

        time--;

        if (time < 0) {
            clearInterval(interval);
            alert("OTP Expired");
            window.location.href = "failed.html";
        }

    }, 1000);
}







</script>
</body>
</html>
