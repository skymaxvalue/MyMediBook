<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patient Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>



body {
    background: #f5f6fa;
    font-family: 'Source Sans Pro', sans-serif;
}

input, select, textarea, button {
    font-family: 'Source Sans Pro', sans-serif;
}

::placeholder {
    font-family: 'Source Sans Pro', sans-serif;
}

.iti, 
.iti * {
    font-family: 'Source Sans Pro', sans-serif;
}

.container {
    width: 900px;
    margin: 60px auto;
}

.tabs {
    display: flex;
    gap: 10px;
}

.tab {
    flex: 1;
    padding: 20px;
    text-align: center;
    border-radius: 20px 20px 0 0;
    font-weight: 600;
    background: #eee;
    color: #777;
}

.tab.active {
    background: #9db6d9;
    color: #000;
}

.tab.completed {
    background: #9ed9b6;
    color: #000;
}

.card {
    background: #fff;
    padding: 40px 60px;
    border-radius: 0 0 20px 20px;
    border: 1px solid #dcdcff;
}

h1 {
    text-align: center;
    margin-bottom: 40px;
}

.form-row {
    display: flex;
    align-items: center;
    margin-bottom: 20px;
}

.form-row label {
    width: 40%;
    font-size: 18px;
}

.form-row input,
.form-row select {
    width: 60%;
    height: 46px;
    padding: 0 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 15px;
}

.buttons {
    display: flex;
    justify-content: space-between;
    margin-top: 50px;
}

.btn-primary {
    background: linear-gradient(90deg, #4A6CF7, #3B5BDB);
    color: white;
    border: none;
    padding: 12px 30px;
    border-radius: 10px;
}

.btn-outline {
    border: 1px solid #4A6CF7;
    background: transparent;
    padding: 12px 30px;
    border-radius: 10px;
}

.step {
    display: none;
}

.step.active {
    display: block;
}

.optional {
    font-size: 13px;
    color: #777;
    display: block;
}

.iti {
    width: 60%;
}

#phone {
    width: fit-content;
    height: 46px;
    border-radius: 8px;
    border: 1px solid #ccc;
    padding-left: 70px;
}

.form-row .iti {
    margin-left: 0;
}

.iti__selected-flag {
    height: 46px;
    display: flex;
    align-items: center;
    padding: 0 10px;
    border-radius: 8px 0 0 8px;
}

.iti__country-list {
    max-height: 200px;
    overflow-y: auto;
    font-size: 14px;
}

.iti__country {
    color: #000;
}

#dob {
    width: fit-content;
}

</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.css"/>
</head>

<body>

<div class="container">

   
    <div class="tabs">
        <div class="tab active">PERSONAL INFORMATION</div>
        <div class="tab">ADDRESS</div>
        <div class="tab">CREDENTIALS</div>
    </div>

    <div class="card">

        <h1>PATIENT SELF-REGISTRATION</h1>
        <form id="signupForm">

        <!-- STEP 1 -->
        <div class="step active">

            <div class="form-row">
                <label>First Name</label>
                <input type="text" placeholder="Enter your first name" required>
            </div>

            <div class="form-row">
                <label>
                    Middle Name <br>
                    <span class="optional">(optional)</span>
                    </label>
                <input type="text" placeholder="Enter your middle name" >
            </div>

            <div class="form-row">
                <label>Last Name</label>
                <input type="text" placeholder="Enter your last name" required>
            </div>

            <div class="form-row">
                <label>Date Of Birth</label>
                <input type="date" id="dob" placeholder="Select your date of birth" required>
            </div>

         
<div class="form-row">
    <label>Phone Number</label>
    <input id="phone" type="tel" placeholder="&nbsp; Enter phone number" required>
</div>
            <div class="form-row">
                <label>Email ID</label>
                <input type="email" placeholder="Enter your email address" required>
            </div>

            <div class="form-row">
                <label>Gender <br>
                <span class="optional">(optional)</span></label>
                <select id="dob">
                    <option>Select gender</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>
            </div>

        </div>

        <!-- STEP 2 -->
        <div class="step">

            <div class="form-row">
                <label>Address Line 1</label>
                <input type="text" placeholder="Enter address line 1" required>
            </div>

            <div class="form-row">
                <label>Address Line 2 (optional)</label>
                <input type="text" placeholder="Enter address line 2">
            </div>

            <div class="form-row">
                <label>City</label>
                <input type="text" placeholder="Enter your city" required>
            </div>

            <div class="form-row">
                <label>Zip Code</label>
                <input type="text" placeholder="Enter your zip code" required>
            </div>

            <div class="form-row">
                <label>Country</label>
    
                <select id="country" required>

                    <option value="" disabled selected>Select country</option>

                    <option value="India">India</option>
                    <option value="USA">USA</option>
                    <option value="UK">UK</option>
                    <option value="Australia">Australia</option>
                    <option value="Canada">Canada</option>
                    <option value="Germany">Germany</option>
                    <option value="France">France</option>
                    <option value="Italy">Italy</option>
                    <option value="Spain">Spain</option>
                    <option value="Netherlands">Netherlands</option>
                    <option value="Singapore">Singapore</option>
                    <option value="UAE">UAE</option>
                    <option value="Saudi Arabia">Saudi Arabia</option>
                    <option value="Japan">Japan</option>
                    <option value="South Korea">South Korea</option>
                    <option value="China">China</option>
                    <option value="Brazil">Brazil</option>
                    <option value="South Africa">South Africa</option>
                </select>
            </div>

            <div class="form-row">
                <label>State</label>
                <select id="state" required>
                    <option value="" disabled selected>Select state</option>
                </select>
            </div>

        </div>

        <!-- STEP 3 -->
        <div class="step">

            <div class="form-row">
                <label>User ID</label>
                <input type="text" placeholder="Enter your user ID  (eg: john_doe123)"  required>
            </div>

            <div class="form-row">
                <label>Password</label>
                <input type="password" placeholder="Enter your password" required>
            </div>

            <div class="form-row">
                <label>Re-enter Password</label>
                <input type="password" placeholder="Re-enter your password" required>
            </div>

            <div class="form-row">
                <label>Security Question</label>
                <select id="securityQuestion" required>
                <option value="" disabled selected>Select question</option>
                <option value="pet">What is your pet's name?</option>
                <option value="school">What was your first school?</option>
                <option value="city">Which city were you born in?</option>
                <option value="mother">What is your mother's maiden name?</option>
                <option value="food">What is your favorite food?</option>
            </select>
            </div>

            <div class="form-row">
                <label>Answer</label>
                <input type="text" placeholder="Enter answer for security question" required>
            </div>

        </div>
        </form>

      
                <div class="buttons">
                <button class="btn-outline" onclick="prevStep()">Back</button>
                <button id="nextBtn" class="btn-primary" onclick="nextStep()">Save and Next</button>
            </div>

    

    </div>
</div>
<script>
const steps = document.querySelectorAll(".step");
const tabs = document.querySelectorAll(".tab");

let currentStep = 0;

function showStep(index) {
    steps.forEach((step, i) => {
        step.classList.toggle("active", i === index);
    });

    tabs.forEach((tab, i) => {
        tab.classList.remove("active", "completed");

        if (i < index) {
            tab.classList.add("completed");
        } else if (i === index) {
            tab.classList.add("active");
        }
    });

    currentStep = index;

    
    const nextBtn = document.getElementById("nextBtn");

    if (currentStep === steps.length - 1) {
        nextBtn.textContent = "Submit";
    } else {
        nextBtn.textContent = "Save and Next";
    }
}


function nextStep() {
    const currentStepElement = steps[currentStep];

    const inputs = currentStepElement.querySelectorAll("input, select");

    for (let input of inputs) {
        if (!input.checkValidity()) {
            input.reportValidity();
            return;
        }
    }

   
    if (currentStep === steps.length - 1) {
        alert("Form Submitted Successfully!");

        window.location.href = "login.html";
        return;
    }

    showStep(currentStep + 1);
}


function prevStep() {
    if (currentStep === 0) {
        window.location.href = "login.html";
    } else {
        showStep(currentStep - 1);
    }
}
</script>


<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/intlTelInput.min.js"></script>

<script>

const input = document.querySelector("#phone");
const countrySelect = document.getElementById("country");


const countryMap = {
    in: "India",
    us: "USA",
    gb: "UK",
    au: "Australia",
    ca: "Canada",
    de: "Germany",
    fr: "France",
    it: "Italy",
    es: "Spain",
    nl: "Netherlands",
    sg: "Singapore",
    ae: "UAE",
    sa: "Saudi Arabia",
    jp: "Japan",
    kr: "South Korea",
    cn: "China",
    br: "Brazil",
    za: "South Africa"
};

const statesData = {
    India: ["West Bengal", "Maharashtra", "Delhi", "Karnataka", "Tamil Nadu"],
    USA: ["California", "Texas", "Florida", "New York"],
    UK: ["England", "Scotland", "Wales", "Northern Ireland"],
    Australia: ["New South Wales", "Victoria", "Queensland"],
    Canada: ["Ontario", "Quebec", "British Columbia"],
    Germany: ["Bavaria", "Berlin", "Hamburg"],
    France: ["Île-de-France", "Provence", "Normandy"],
    UAE: ["Dubai", "Abu Dhabi"],
    Japan: ["Tokyo", "Osaka"],
    Brazil: ["São Paulo", "Rio de Janeiro"]
};

const stateSelect = document.getElementById("state");

function updateStates(country) {
    // reset dropdown
    stateSelect.innerHTML = '<option value="" disabled selected>Select state</option>';

    if (!statesData[country]) return;

    statesData[country].forEach(state => {
        const option = document.createElement("option");
        option.value = state;
        option.textContent = state;
        stateSelect.appendChild(option);
    });
}

countrySelect.addEventListener("change", function () {
    updateStates(this.value);
});

const iti = window.intlTelInput(input, {
    initialCountry: "in",
    separateDialCode: true,
    preferredCountries: ["in", "us", "gb"]
});



function setCountryDropdown(mappedCountry) {
    const options = countrySelect.options;

    for (let i = 0; i < options.length; i++) {
        if (options[i].value === mappedCountry) {
            countrySelect.selectedIndex = i;

            // 🔥 UPDATE STATES ALSO
            updateStates(mappedCountry);

            break;
        }
    }
}


input.addEventListener("countrychange", function () {
    const countryData = iti.getSelectedCountryData();
    const countryCode = countryData.iso2;

    const mappedCountry = countryMap[countryCode];

    if (mappedCountry) {
        setCountryDropdown(mappedCountry);
    }
});


window.addEventListener("load", () => {
    const countryData = iti.getSelectedCountryData();
    const mappedCountry = countryMap[countryData.iso2];

    if (mappedCountry) {
        setCountryDropdown(mappedCountry);
    }
});
</script>

</body>
</html>
