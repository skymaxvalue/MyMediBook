<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Doctor Availability</title>

<link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

<style>
.availability-container {
   padding: 5px 20px 20px; 
    background: #f5f7fb;
    max-width: 1100px;
    margin: auto;
}

.availability-container h2 {
    text-align: center;
    margin: 10px 0 20px;
}

.availability-container .date-filter {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 25px;
}

.date-filter input {
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

.availability-card {
    display: flex;
    gap: 25px;
}

.doctor-info {
    width: 260px;
    background: #fff;
    border-radius: 16px;
    padding: 25px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
}

.doc-img {
    width: 150px;
    height: 150px;
    border-radius: 12px;
    object-fit: cover;
    margin-bottom: 10px;
}

.tag {
    background: #3b5bdb;
    padding: 5px 12px;
    border-radius: 6px;
    margin-top: 10px;
    color: white;
}

.back-btn {
    width: 100%;
    padding: 10px;
    border: none;
    background: #3b63d1;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 20px;
}

.availability-container .schedule-box {
    flex: 1;
    background: #fff;
    border-radius: 16px;
    padding: 30px 35px;
    box-shadow: 0 6px 14px rgba(0,0,0,0.1);
}

.availability-container .row {
    display: flex;
    align-items: center;
    padding: 8px 0;
}

.availability-container .row span:first-child {
    font-size: 18px;
    font-weight: 600;
}

.availability-container .badge {
    margin-left: auto;
    padding: 10px 20px;
    border-radius: 12px;
    font-weight: 600;
    color: white;
}

.green { background: #1f7a3f; }
.red { background: #d11a1a; }

.beige {
    background: #e7c29f;
    color: black;
}

.week-nav {
    display: flex;
    justify-content: center;
    gap: 80px;
    margin-top: 20px;
}

.week-item {
    text-align: center;
}

.week-item button {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: none;
    background: #d6e4ff;
    cursor: pointer;
}

.availability-container .legend {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
}

.dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
}

.dot.available { background: #1f7a3f; }
.dot.booked { background: #999; }

.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: rgba(0,0,0,0.4);

    display: none;
    justify-content: center;
    align-items: center;
    padding: 20px;

    z-index: 1000;
}

.appointment-card {
    width: 680px;
    max-width: 92vw;
    max-height: 90vh;
    background: #fff;
    border-radius: 18px;
    padding: 15px 20px;
    overflow: hidden;
    position: relative;
}

.close-icon {
    position: absolute;
    top: 10px;
    right: 10px;
    background: #ff4d4f;
    color: white;
    padding: 6px 10px;
    border-radius: 8px;
    cursor: pointer;
}

.appointment-card h2 {
    text-align: center;
    font-size: 20px;
    margin-bottom: 4px;
}

.slot-date {
    text-align: center;
    margin-bottom: 10px;
    font-size: 14px;
    font-weight: 600;
}

.appointment-body {
    display: flex;
    gap: 20px;
}

.doctor-info-popup {
    width: 150px;
    text-align: center;
}

.doctor-img-popup {
    width: 110px;
    height: 110px;
    border-radius: 12px;
    object-fit: cover;
}

.slots-section {
    flex: 1;
}

.slots-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px 12px;
}

.slot {
    padding: 8px;
    font-size: 13px;
    border-radius: 8px;
    border: 1px solid #ccc;
    text-align: center;
    font-weight: 600;
    cursor: pointer;
}

.slot.available {
    background: #e6f7ee;
    color: #1e7e34;
}

.slot.booked {
    background: #ccc;
    color: red;
    cursor: not-allowed;
}

.slot.available:hover {
    background: #1f7a3f;
    color: white;
}

.slot.selected {
    background: #3b5bdb !important;
    color: white !important;
}

.legend-popup {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 8px 0;
    font-size: 13px;
}

.book-btn {
    width: 70%;
    margin: 12px auto 0;
    display: block;
    padding: 10px;
    border-radius: 12px;
    background: linear-gradient(90deg, #4A6CF7, #3B5BDB);
    color: white;
    border: none;
    cursor: pointer;
}

.appointment-card {
    transform: scale(1.05);
    transform-origin: center;
}

.appointment-card h2 {
    font-size: 22px;
}

.slot-date {
    font-size: 15px;
}

.doctor-info-popup h4 {
    font-size: 16px;
}

.doctor-info-popup p {
    font-size: 14px;
}

.tag {
    font-size: 13px;
}

.slot {
    font-size: 14px;
    padding: 10px;
}

.legend-popup {
    font-size: 14px;
}

.book-btn {
    font-size: 15px;
    padding: 12px;
}

.doctor-info p {
    margin-bottom: 8px;
}

.badge {
    cursor: pointer;
}

.green {
    cursor: pointer;
}

.red {
    cursor: pointer;
}

.beige {
    cursor: not-allowed;
}



</style>
</head>

<body>


<div id="navbar-container"></div>

<div class="availability-container">

    <h2>Doctor's Availabilities</h2>

    <div class="date-filter">
        <label>View Availability From:</label> <input type="date" id="dateFilter">
    </div>

    <div class="availability-card">

        <div class="doctor-info">

            <div class="doctor-top">
                <img src="images/doc.jpg" class="doc-img">

                <h3>Dr. Kumar</h3>
                <p>MBBS</p>
                <span class="tag">GENERAL</span>
            </div>

            <button class="back-btn" onclick="goBack()">⬅ Return to Doctor List</button>

        </div>

    
        <div class="schedule-box">

            <div id="scheduleContainer"></div>

            <div class="week-nav">
                <div class="week-item">
                    <button onclick="prevWeek()">❮</button>
                    <span>Previous Week</span>
                </div>

                <div class="week-item">
                    <button onclick="nextWeek()">❯</button>
                    <span>Next Week</span>
                </div>
            </div>

        </div>

    </div>

   
    <div class="legend">
        <span><i class="dot green"></i> Available</span>
        <span><i class="dot red"></i> Limited Slots</span>
        <span><i class="dot beige"></i> Unavailable</span>
    </div>

</div>

<div id="bookingModal" class="modal">
    <div class="modal-content">
        <h3>Book Appointment</h3>

        <p id="selectedDate"></p>
        <p id="selectedTime"></p>

        <button onclick="confirmBooking()">Confirm</button>
        <button onclick="closeModal()">Cancel</button>
    </div>
</div>

<div id="slotsModal" class="modal">
  <div class="modal-content appointment-card">

  
    <div class="close-icon" onclick="closeSlotsModal()">✖</div>

    <h2>Available Appointments</h2>
    <p id="slotDate" class="slot-date"></p>

    <div class="appointment-body">

    
      <div class="doctor-info-popup">
        <img src="images/doc.jpg" class="doctor-img-popup">
        <h4>Dr. Kumar</h4>
        <p>MBBS</p>
        <span class="tag">GENERAL</span>
      </div>

  
      <div class="slots-section">
        <div id="slotsContainer" class="slots-grid"></div>
      </div>

    </div>

  
    <div class="legend-popup">
      <span><span class="dot available"></span> Available</span>
      <span><span class="dot booked"></span> Already Booked</span>
    </div>



    

   
    <button class="book-btn" onclick="goToBooking()">Book Appointment</button>

  </div>

</div>

<div id="footer-container"></div>

<script>
fetch("footer.html")
.then(res => res.text())
.then(data => {
    document.getElementById("footer-container").innerHTML = data;
});
</script>

<script src="js/navbar.js"></script>
<script src="js/availability.js"></script>

</body>
</html>
