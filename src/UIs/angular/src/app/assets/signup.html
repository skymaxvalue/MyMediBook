<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patient Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/signup.css">
<style>



</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.css"/>
</head>

<body>

<div class="container">

   
    <div class="tabs">
        <div class="tab active">PERSONAL INFORMATION</div>
        <div class="tab">ADDRESS</div>
        <div class="tab">CREDENTIALS</div>
    </div>

    <div class="card">

        <h1>PATIENT SELF-REGISTRATION</h1>
        <form id="signupForm">

        <!-- STEP 1 -->
        <div class="step active">

            <div class="form-row">
                <label>First Name<span class="star">*</span></label>
                <input type="text" placeholder="Enter your first name" required>
            </div>

            <div class="form-row">
                <label>Middle Name</label>
                <input type="text" placeholder="Enter your middle name" >
            </div>

            <div class="form-row">
                <label>Last Name<span class="star">*</span></label>
                <input type="text" placeholder="Enter your last name" required>
            </div>

            <div class="form-row">
                <label>Date Of Birth<span class="star">*</span></label>
                <input type="date" id="dob" placeholder="Select your date of birth" required>
            </div>

         
<div class="form-row">
    <label>Phone Number<span class="star">*</span></label>
    <input id="phone" type="tel" placeholder="&nbsp; Enter phone number" required>
</div>
            <div class="form-row">
                <label>Email ID<span class="star">*</span></label>
                <input type="email" placeholder="Enter your email address" required>
            </div>

            <div class="form-row">
                <label>Gender<br></label>
                <select id="dob">
                    <option>Select gender</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>
            </div>

        </div>

        <!-- STEP 2 -->
        <div class="step">

            <div class="form-row">
                <label>Address Line 1<span class="star">*</span></label>
                <input type="text" placeholder="Enter address line 1" required>
            </div>

            <div class="form-row">
                <label>Address Line 2</label>
                <input type="text" placeholder="Enter address line 2">
            </div>

            <div class="form-row">
                <label>City<span class="star">*</span></label>
                <input type="text" placeholder="Enter your city" required>
            </div>

            <div class="form-row">
                <label>Zip Code<span class="star">*</span></label>
                <input type="text" placeholder="Enter your zip code" required>
            </div>

            <div class="form-row">
                <label>Country<span class="star">*</span></label>
    
                <select id="country" required>

                    <option value="" disabled selected>Select country</option>

                    <option value="India">India</option>
                    <option value="USA">USA</option>
                    <option value="UK">UK</option>
                    <option value="Australia">Australia</option>
                    <option value="Canada">Canada</option>
                    <option value="Germany">Germany</option>
                    <option value="France">France</option>
                    <option value="Italy">Italy</option>
                    <option value="Spain">Spain</option>
                    <option value="Netherlands">Netherlands</option>
                    <option value="Singapore">Singapore</option>
                    <option value="UAE">UAE</option>
                    <option value="Saudi Arabia">Saudi Arabia</option>
                    <option value="Japan">Japan</option>
                    <option value="South Korea">South Korea</option>
                    <option value="China">China</option>
                    <option value="Brazil">Brazil</option>
                    <option value="South Africa">South Africa</option>
                </select>
            </div>

            <div class="form-row">
                <label>State</label>
                <select id="state" required>
                    <option value="" disabled selected>Select state</option>
                </select>
            </div>

        </div>

        <!-- STEP 3 -->
        <div class="step">

            <div class="form-row">
                <label>User ID<span class="star">*</span></label>
                <input type="text" placeholder="Enter your user ID  (eg: john_doe123)"  required>
            </div>

            <div class="form-row">
                <label>Password<span class="star">*</span></label>
                <input type="password" placeholder="Enter your password" required>
            </div>

            <div class="form-row">
                <label>Re-enter Password<span class="star">*</span></label>
                <input type="password" placeholder="Re-enter your password" required>
            </div>

            <div class="form-row">
                <label>Security Question<span class="star">*</span></label>
                <select id="securityQuestion" required>
                <option value="" disabled selected>Select question</option>
                <option value="pet">What is your pet's name?</option>
                <option value="school">What was your first school?</option>
                <option value="city">Which city were you born in?</option>
                <option value="mother">What is your mother's maiden name?</option>
                <option value="food">What is your favorite food?</option>
            </select>
            </div>

            <div class="form-row">
                <label>Answer<span class="star">*</span></label>
                <input type="text" placeholder="Enter answer for security question" required>
            </div>

        </div>
        </form>

      
                <div class="buttons">
                <button class="btn-outline" onclick="prevStep()">Back</button>
                <button id="nextBtn" class="btn-primary" onclick="nextStep()">Save and Next</button>
            </div>

    

    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/intlTelInput.min.js"></script>
<script src="js/signup.js"></script>

</body>
</html>
