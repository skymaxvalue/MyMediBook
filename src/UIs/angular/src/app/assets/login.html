<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - My Medi Book</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
    
</head>
<body>

    <div class="container">

  
        <div class="left-panel">
            <h1 class="left-title">Doctors Just a Click Away.</h1>

            <img src="images/doctor.png" alt="Doctor Illustration" class="doctor-img">

            <p class="left-footer">Welcome to My Medi Book</p>
        </div>

    
        <div class="right-panel">

            <div class="form-container">

           
                <div class="logo">
                    <img src="images/logo.png" alt="Logo">
                    <span>My <strong>Medi</strong> Book</span>
                </div>

             
                <h2>WELCOME BACK</h2>
                <p class="subtitle">Please login to your account</p>


                <form id="loginForm">

                    
                    <div class="input-group">
                        <label>Username</label>
                        <input type="text" id="username" placeholder="Enter your username"  required>
                    </div>

                   
                    <div class="input-group">
                        <label>Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" placeholder="Enter your password"required>
                            
                            <img src="images/show.png" 
                                id="togglePassword" 
                                class="toggle-password" 
                                alt="toggle password">
                        </div>
                        </div>
                  

                    
                
                     <div class="options">

                  <div class="remember">
                     <input type="checkbox" id="remember">

                                  <label for="remember">Remember me</label>
                              </div>

                              <a href="forgot.html" class="forgot">Forgot password?</a>

                          </div>
                                            


                      

                    
                    <button type="submit" class="login-btn">Login</button>

                    
                    <button type="button" class="google-btn">
                        <img src="images/google.png" alt="Google">
                        Sign in with Google
                    </button>

                    
                    <p class="signup-text">
                        Don’t have an account? <a href="signup.html">Sign Up</a>
                    </p>

                </form>

            </div>

        </div>

    </div>

    
    <script src="js/login.js"></script>

    

</body>
</html>
