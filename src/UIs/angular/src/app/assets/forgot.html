<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
     <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/forgot.css">

   
</head>

<body>

<div class="otp-wrapper">

    <div class="otp-card">

        <h1>FORGOT PASSWORD</h1>

        <p class="otp-subtext">
            Enter your registered email or mobile number<br>
            to receive OTP.
        </p>

  
       <div class="forgot-input">
            <input type="text" id="userInput" placeholder="Enter your registered Email / Mobile Number">
        </div>

    
        <button class="btn-primary" id="sendOtpBtn">Send OTP</button>

       
        <p class="back-text">
            Back to <a href="login.html">Login</a>
        </p>

    </div>

</div>

<script src="js/forgot.js"></script>

</body>
</html>
