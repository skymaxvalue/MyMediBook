<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Associate Schedule List</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/associate-schedule-database.css">
</head>
<body>
<main class="page-shell">
    <div class="shape shape-left" aria-hidden="true"></div>
    <div class="shape shape-right" aria-hidden="true"></div>

    <section class="page-container">
        <h1 class="page-title">Associate Schedule List</h1>

        <div class="table-card">
            <table class="associate-table" aria-label="Associate schedule list">
                <thead>
                    <tr>
                        <th data-sort="0">Full Name <span class="sort-icon">▼</span></th>
                        <th data-sort="1">Department <span class="sort-icon">▼</span></th>
                        <th data-sort="2">Speciality <span class="sort-icon">▼</span></th>
                        <th data-sort="3">From Date </th>
                        <th data-sort="4">To Date </th>
                        <th data-sort="5">Time <span class="sort-icon">▼</span></th>
                        <th class="actions-head">Actions</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>

            <div id="deleteModal" class="modal hidden">
                <div class="modal-box">
                    <p id="deleteText">Delete?</p>
                    <div class="modal-actions">
                        <button id="confirmDelete" class="action-btn delete">Yes, Delete</button>
                        <button id="cancelDelete" class="action-btn cancel">Cancel</button>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>
<div id="footer-container"></div>

<script>
fetch("footer.html")
.then(res => res.text())
.then(data => {
    document.getElementById("footer-container").innerHTML = data;
});
</script>

<script src="js/associate-schedule-database.js"></script>
</body>
</html>
